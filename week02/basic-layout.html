<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Vahatra Iharantsoa RAMANANANDRONIAINA">
    <title>Basic HTML Structure</title>
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="basic layout logo" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li>
                <a>https://facebook.com</a>
            </li>
            <li>
                <a>https://instagram.com</a>
            </li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor sit amet consectetur.</p>
        </section>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing.</p>
        </section>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/adelaide-australia/800x500/adelaide-australia-temple-lds-675332-wallpaper.jpg"
          alt="Adelaide Australia Temple" width="200">
    </aside>
    <footer>
        <p>Vahatra Iharantsoa RAMANANANDRONIAINA</p>
    </footer>

</body>

</html>
